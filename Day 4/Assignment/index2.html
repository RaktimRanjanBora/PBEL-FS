<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Keyboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#ffd6c9,#ffe8b5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#f6dca4;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#8a5b00;
}

.row{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.key{
    width:50px;
    height:45px;
    margin:4px;
    background:#fff5e8;
    border:1px solid #c5a26a;
    border-radius:8px;
    box-shadow:0 4px #b68a4a;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:.2s;
    font-size:14px;
}

.key:hover{
    background:#ffe0a8;
}

.key:active{
    transform:translateY(4px);
    box-shadow:0 1px #b68a4a;
}

.wide{
    width:90px;
}

.space{
    width:320px;
}
</style>

</head>
<body>

<div class="container">
<h1>KEYBOARD</h1>

<div class="row">
<div class="key">Esc</div>
<div class="key">F1</div>
<div class="key">F2</div>
<div class="key">F3</div>
<div class="key">F4</div>
<div class="key">F5</div>
<div class="key">F6</div>
<div class="key">F7</div>
<div class="key">F8</div>
<div class="key">F9</div>
<div class="key">F10</div>
<div class="key">F11</div>
<div class="key">F12</div>
</div>

<div class="row">
<div class="key">~</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">0</div>
<div class="key">-</div>
<div class="key">=</div>
<div class="key wide">Backspace</div>
</div>

<div class="row">
<div class="key wide">Tab</div>
<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>
<div class="key">[</div>
<div class="key">]</div>
</div>

<div class="row">
<div class="key wide">Caps</div>
<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key">;</div>
<div class="key">'</div>
<div class="key wide">Enter</div>
</div>

<div class="row">
<div class="key wide">Shift</div>
<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key">,</div>
<div class="key">.</div>
<div class="key">/</div>
<div class="key wide">Shift</div>
</div>

<div class="row">
<div class="key">Ctrl</div>
<div class="key">Fn</div>
<div class="key">Win</div>
<div class="key">Alt</div>
<div class="key space">Space</div>
<div class="key">Alt</div>
<div class="key">Fn</div>
<div class="key">Ctrl</div>
</div>

</div>

</body>
</html>
